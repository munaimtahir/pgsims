name: docker
services:
  backend:
    build:
      context: /home/munaim/srv/apps/pgsims/backend
      dockerfile: Dockerfile
    command:
      - sh
      - -c
      - |-
        python manage.py migrate --noinput &&
               python manage.py collectstatic --noinput &&
               gunicorn sims_project.wsgi:application --bind 0.0.0.0:8014 --workers 4 --timeout 60
    container_name: pgsims_backend_prod
    depends_on:
      db:
        condition: service_healthy
        required: true
      redis:
        condition: service_healthy
        required: true
    environment:
      ALLOWED_HOSTS: pgsims.alshifalab.pk,34.16.82.13,localhost,127.0.0.1
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CORS_ALLOWED_ORIGINS: https://pgsims.alshifalab.pk
      CSRF_COOKIE_SECURE: "True"
      CSRF_TRUSTED_ORIGINS: https://pgsims.alshifalab.pk
      DATABASE_URL: postgresql://sims_user:@db:5432/sims_db
      DEBUG: "False"
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      EMAIL_HOST: ""
      EMAIL_HOST_PASSWORD: ""
      EMAIL_HOST_USER: ""
      EMAIL_PORT: "587"
      EMAIL_USE_TLS: "True"
      LOG_FILE_PATH: /tmp/sims_error.log
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ""
      SECURE_SSL_REDIRECT: "True"
      SESSION_COOKIE_SECURE: "True"
      USE_PROXY_HEADERS: "True"
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:8014/healthz/
      timeout: 10s
      interval: 30s
      retries: 3
      start_period: 40s
    networks:
      sims_network: null
    ports:
      - mode: ingress
        host_ip: 127.0.0.1
        target: 8014
        published: "8014"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /home/munaim/srv/apps/pgsims/backend/staticfiles
        target: /app/staticfiles
        bind: {}
      - type: bind
        source: /home/munaim/srv/apps/pgsims/backend/media
        target: /app/media
        bind: {}
      - type: bind
        source: /home/munaim/srv/apps/pgsims/backend/logs
        target: /app/logs
        bind: {}
  beat:
    build:
      context: /home/munaim/srv/apps/pgsims/backend
      dockerfile: Dockerfile
    command:
      - celery
      - -A
      - sims_project
      - beat
      - -l
      - info
      - --scheduler
      - django_celery_beat.schedulers:DatabaseScheduler
    container_name: pgsims_beat
    depends_on:
      db:
        condition: service_started
        required: true
      redis:
        condition: service_started
        required: true
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DATABASE_URL: postgresql://sims_user:@db:5432/sims_db
      DEBUG: "False"
      LOG_FILE_PATH: /tmp/sims_error.log
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ""
    healthcheck:
      disable: true
    networks:
      sims_network: null
    restart: unless-stopped
    volumes:
      - type: bind
        source: /home/munaim/srv/apps/pgsims/backend/logs
        target: /app/logs
        bind: {}
  db:
    container_name: pgsims_db_prod
    environment:
      POSTGRES_DB: sims_db
      POSTGRES_PASSWORD: ""
      POSTGRES_USER: sims_user
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U sims_user
      timeout: 5s
      interval: 10s
      retries: 5
    image: postgres:15-alpine
    networks:
      sims_network: null
    restart: unless-stopped
    volumes:
      - type: volume
        source: PROD_pgsims_pgdata
        target: /var/lib/postgresql/data
        volume: {}
  frontend:
    build:
      context: /home/munaim/srv/apps/pgsims/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    container_name: pgsims_frontend_prod
    depends_on:
      backend:
        condition: service_started
        required: true
    environment:
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: /api
      NODE_ENV: production
      PORT: "3000"
      SERVER_API_URL: http://backend:8014
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - 'require(''http'').get(''http://localhost:3000'', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})'
      timeout: 10s
      interval: 30s
      retries: 3
      start_period: 40s
    networks:
      sims_network: null
    ports:
      - mode: ingress
        host_ip: 127.0.0.1
        target: 3000
        published: "8082"
        protocol: tcp
    restart: unless-stopped
  redis:
    command:
      - redis-server
      - --appendonly
      - "yes"
    container_name: pgsims_redis_prod
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      timeout: 5s
      interval: 10s
      retries: 5
    image: redis:7-alpine
    networks:
      sims_network: null
    restart: unless-stopped
    volumes:
      - type: volume
        source: PROD_pgsims_redis_data
        target: /data
        volume: {}
  worker:
    build:
      context: /home/munaim/srv/apps/pgsims/backend
      dockerfile: Dockerfile
    command:
      - celery
      - -A
      - sims_project
      - worker
      - -l
      - info
      - --concurrency=2
    container_name: pgsims_worker
    depends_on:
      db:
        condition: service_started
        required: true
      redis:
        condition: service_started
        required: true
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DATABASE_URL: postgresql://sims_user:@db:5432/sims_db
      DEBUG: "False"
      LOG_FILE_PATH: /tmp/sims_error.log
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ""
    healthcheck:
      disable: true
    networks:
      sims_network: null
    restart: unless-stopped
    volumes:
      - type: bind
        source: /home/munaim/srv/apps/pgsims/backend/media
        target: /app/media
        bind: {}
      - type: bind
        source: /home/munaim/srv/apps/pgsims/backend/logs
        target: /app/logs
        bind: {}
networks:
  sims_network:
    name: docker_sims_network
    driver: bridge
volumes:
  PROD_pgsims_pgdata:
    name: PROD_pgsims_pgdata
  PROD_pgsims_redis_data:
    name: PROD_pgsims_redis_data
