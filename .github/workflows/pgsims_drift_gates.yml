name: PGSIMS CI Gates

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-truth-gates:
    name: Backend truth gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    env:
      SECRET_KEY: test-secret-key-for-ci
      DJANGO_SETTINGS_MODULE: sims_project.settings_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run Django checks
        run: python manage.py check

      - name: Run required truth tests
        run: |
          pytest -v \
            sims/logbook/test_api.py::PGLogbookEntryAPITests::test_submit_return_feedback_visible_and_resubmit_approve_flow \
            sims/rotations/test_canonical_migration_gate.py \
            sims/_devtools/tests/test_drift_guards.py

  frontend-gates:
    name: Frontend lint, unit test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run unit tests
        run: npm test -- --passWithNoTests

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

  integration-truth-map:
    name: Integration truth-map gate
    runs-on: ubuntu-latest
    needs: [backend-truth-gates, frontend-gates]
    env:
      SECRET_KEY: test-secret-key-for-ci
      DJANGO_SETTINGS_MODULE: sims_project.settings_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Extract backend endpoints
        run: cd backend && python sims/_devtools/truthmap_extract.py

      - name: Extract frontend endpoints
        run: cd frontend && grep -rn "apiClient\.\(get\|post\|put\|patch\|delete\)" lib/api/ --include="*.ts" > frontend_endpoints.txt || true

      - name: Generate integration truth-map
        run: python scripts/truthmap_generate.py

      - name: Verify truth-map verdict is PASS
        run: grep -A 1 "^## G) Verdict" docs/contracts/INTEGRATION_TRUTH_MAP.md | grep -q "^\*\*PASS\*\*"

      - name: Verify frontend unmatched calls are zero
        run: '! grep -q "\*\*BROKEN\*\*" docs/contracts/INTEGRATION_TRUTH_MAP.md'
