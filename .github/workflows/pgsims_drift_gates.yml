name: PGSIMS Drift Gates (Serial Verification)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Job 1: Backend Tests (runs first)
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Django system check
        working-directory: ./backend
        env:
          SECRET_KEY: 'test-secret-key-for-ci'
          DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/test_db'
          REDIS_URL: 'redis://localhost:6379/0'
          CELERY_BROKER_URL: 'redis://localhost:6379/1'
        run: |
          python manage.py check --deploy
      
      - name: Run backend tests
        working-directory: ./backend
        env:
          SECRET_KEY: 'test-secret-key-for-ci'
          DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/test_db'
          REDIS_URL: 'redis://localhost:6379/0'
          CELERY_BROKER_URL: 'redis://localhost:6379/1'
        run: |
          python manage.py test

  # Job 2: Frontend Build (runs after backend-tests)
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: backend-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Build frontend
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: 'http://localhost:8000'
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/.next
          retention-days: 1

  # Job 3: Playwright E2E Tests (runs after frontend-build)
  playwright-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: frontend-build
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install Python dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install Node dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium
      
      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/.next
      
      - name: Run migrations
        working-directory: ./backend
        env:
          SECRET_KEY: 'test-secret-key-for-ci'
          DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/test_db'
          REDIS_URL: 'redis://localhost:6379/0'
          CELERY_BROKER_URL: 'redis://localhost:6379/1'
        run: python manage.py migrate
      
      - name: Start backend server
        working-directory: ./backend
        env:
          SECRET_KEY: 'test-secret-key-for-ci'
          DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/test_db'
          REDIS_URL: 'redis://localhost:6379/0'
          CELERY_BROKER_URL: 'redis://localhost:6379/1'
        run: |
          python manage.py runserver 0.0.0.0:8000 &
          echo $! > backend.pid
          sleep 5
      
      - name: Start frontend server
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: 'http://localhost:8000'
        run: |
          npm run start &
          echo $! > frontend.pid
          sleep 5
      
      - name: Run Playwright tests
        working-directory: ./frontend
        run: npx playwright test
      
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7
      
      - name: Stop servers
        if: always()
        run: |
          [ -f backend/backend.pid ] && kill $(cat backend/backend.pid) || true
          [ -f frontend/frontend.pid ] && kill $(cat frontend/frontend.pid) || true

  # Job 4: Integration Truth-Map Verification (runs after playwright-tests)
  truth-map-verification:
    name: Integration Truth-Map Verification
    runs-on: ubuntu-latest
    needs: playwright-tests
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Extract backend endpoints
        working-directory: ./backend
        env:
          SECRET_KEY: 'test-secret-key-for-ci'
          DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/test_db'
          REDIS_URL: 'redis://localhost:6379/0'
          CELERY_BROKER_URL: 'redis://localhost:6379/1'
        run: python sims/_devtools/truthmap_extract.py
      
      - name: Extract frontend endpoints
        working-directory: ./frontend
        run: |
          grep -rn "apiClient\.\(get\|post\|put\|patch\|delete\)" lib/api/ --include="*.ts" > frontend_endpoints.txt || true
      
      - name: Generate integration truth-map
        run: python3 scripts/truthmap_generate.py
      
      - name: Verify truth-map verdict is PASS
        run: |
          if grep -q "^## G) Verdict" docs/contracts/INTEGRATION_TRUTH_MAP.md; then
            if grep -A 1 "^## G) Verdict" docs/contracts/INTEGRATION_TRUTH_MAP.md | grep -q "^\*\*PASS\*\*"; then
              echo "✅ Truth-map verdict: PASS"
              exit 0
            else
              echo "❌ Truth-map verdict is not PASS"
              grep -A 5 "^## G) Verdict" docs/contracts/INTEGRATION_TRUTH_MAP.md
              exit 1
            fi
          else
            echo "❌ Truth-map verdict section not found"
            exit 1
          fi
      
      - name: Check for unmatched frontend calls
        run: |
          if grep -q "Frontend calls unmatched.*: \*\*0\*\*" docs/contracts/INTEGRATION_TRUTH_MAP.md; then
            echo "✅ No unmatched frontend calls"
          else
            echo "❌ Found unmatched frontend calls"
            grep "Frontend calls unmatched" docs/contracts/INTEGRATION_TRUTH_MAP.md
            exit 1
          fi
      
      - name: Upload truth-map artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-truth-map
          path: docs/contracts/INTEGRATION_TRUTH_MAP.md
          retention-days: 7

  # Final Status Job
  drift-gates-status:
    name: Drift Gates Status
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build, playwright-tests, truth-map-verification]
    if: always()
    
    steps:
      - name: Check all gates passed
        run: |
          if [ "${{ needs.backend-tests.result }}" != "success" ] || \
             [ "${{ needs.frontend-build.result }}" != "success" ] || \
             [ "${{ needs.playwright-tests.result }}" != "success" ] || \
             [ "${{ needs.truth-map-verification.result }}" != "success" ]; then
            echo "❌ One or more drift gates failed"
            exit 1
          fi
          echo "✅ All drift gates passed"
