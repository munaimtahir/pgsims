{% extends "base/base.html" %}

{% block content %}
<div class="container py-4">
    <h1 class="h4 mb-3">Certificate Review</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Submit Review</button>
        <a href="{% url 'certificates:detail' pk=certificate.pk %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
