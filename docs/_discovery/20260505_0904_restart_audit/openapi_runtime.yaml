components:
  schemas:
    ActivityLog:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        actor:
          type: integer
          readOnly: true
          nullable: true
        actor_display:
          type: string
          readOnly: true
        action:
          allOf:
          - $ref: '#/components/schemas/ActivityLogActionEnum'
          readOnly: true
        verb:
          type: string
          readOnly: true
        target_object_id:
          type: string
          readOnly: true
        target_repr:
          type: string
          readOnly: true
        metadata:
          readOnly: true
        ip_address:
          type: string
          readOnly: true
          nullable: true
        is_sensitive:
          type: boolean
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - action
      - actor
      - actor_display
      - created_at
      - id
      - ip_address
      - is_sensitive
      - metadata
      - target_object_id
      - target_repr
      - verb
    ActivityLogActionEnum:
      enum:
      - view
      - create
      - update
      - delete
      - export
      - login
      - logout
      type: string
      description: |-
        * `view` - View
        * `create` - Create
        * `update` - Update
        * `delete` - Delete
        * `export` - Export
        * `login` - Login
        * `logout` - Logout
    AssignedPG:
      type: object
      description: Minimal serializer for supervisor-assigned PGs.
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        full_name:
          type: string
          readOnly: true
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        specialty:
          nullable: true
          description: |-
            Medical specialty (required for PGs and Supervisors)

            * `medicine` - Internal Medicine
            * `surgery` - Surgery
            * `pediatrics` - Pediatrics
            * `gynecology` - Gynecology & Obstetrics
            * `orthopedics` - Orthopedics
            * `cardiology` - Cardiology
            * `neurology` - Neurology
            * `urology` - Urology
            * `psychiatry` - Psychiatry
            * `dermatology` - Dermatology
            * `radiology` - Radiology
            * `anesthesia` - Anesthesia
            * `pathology` - Pathology
            * `microbiology` - Microbiology
            * `pharmacology` - Pharmacology
            * `community_medicine` - Community Medicine
            * `forensic_medicine` - Forensic Medicine
            * `other` - Other
          oneOf:
          - $ref: '#/components/schemas/SpecialtyEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        year:
          nullable: true
          description: |-
            Training year (required for PGs)

            * `1` - Year 1
            * `2` - Year 2
            * `3` - Year 3
            * `4` - Year 4
            * `5` - Year 5
          oneOf:
          - $ref: '#/components/schemas/YearEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        is_active:
          type: boolean
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
      required:
      - full_name
      - id
      - username
    AssignmentTypeEnum:
      enum:
      - primary_training
      - posting
      - faculty_site
      type: string
      description: |-
        * `primary_training` - Primary Training
        * `posting` - Posting
        * `faculty_site` - Faculty Site
    AuditReport:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
        generated_at:
          type: string
          format: date-time
          readOnly: true
        payload:
          readOnly: true
        created_by:
          type: integer
          readOnly: true
          nullable: true
      required:
      - created_by
      - end
      - generated_at
      - id
      - payload
      - start
    Batch:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          description: Batch name (e.g., 2024 Batch)
          maxLength: 100
        program:
          allOf:
          - $ref: '#/components/schemas/ProgramEnum'
          description: |-
            Academic program

            * `mbbs` - MBBS
            * `md` - MD
            * `ms` - MS
            * `dm` - DM
            * `mch` - MCh
            * `diploma` - Diploma
            * `fellowship` - Fellowship
        department:
          type: integer
          description: Department for this batch
        department_name:
