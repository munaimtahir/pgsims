openapi: 3.0.3
info:
  title: PGSIMS API
  version: 1.0.0
  description: Postgraduate Student Information Management System active API contract.
paths:
  /academics/api/batches/:
    get:
      operationId: academics_api_batches_list
      description: ViewSet for Batch CRUD operations.
      parameters:
      - in: query
        name: active
        schema:
          type: boolean
      - in: query
        name: department
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: program
        schema:
          type: string
          enum:
          - diploma
          - dm
          - fellowship
          - mbbs
          - mch
          - md
          - ms
        description: |-
          Academic program

          * `mbbs` - MBBS
          * `md` - MD
          * `ms` - MS
          * `dm` - DM
          * `mch` - MCh
          * `diploma` - Diploma
          * `fellowship` - Fellowship
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - academics
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBatchList'
          description: ''
    post:
      operationId: academics_api_batches_create
      description: ViewSet for Batch CRUD operations.
      tags:
      - academics
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Batch'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Batch'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Batch'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Batch'
          description: ''
  /academics/api/batches/{id}/:
