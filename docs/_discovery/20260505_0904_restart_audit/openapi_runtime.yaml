  /academics/api/students/:
    get:
      operationId: academics_api_students_list
      description: ViewSet for StudentProfile CRUD operations.
      parameters:
      - in: query
        name: batch
        schema:
          type: integer
      - in: query
        name: batch__department
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - active
          - admitted
          - enrolled
          - expelled
          - graduated
          - on_leave
          - suspended
          - withdrawn
        description: |-
          Current enrollment status

          * `admitted` - Admitted
          * `enrolled` - Enrolled
          * `active` - Active
          * `on_leave` - On Leave
          * `suspended` - Suspended
          * `withdrawn` - Withdrawn
          * `graduated` - Graduated
          * `expelled` - Expelled
      tags:
      - academics
      security:
      - jwtAuth: []
      - cookieAuth: []
